<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>v-2 Stream Room</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 900px;
            text-align: center;
        }
        .search-box {
            margin-bottom: 20px;
        }
        input {
            padding: 12px;
            width: 60%;
            border: none;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            padding: 12px 20px;
            background-color: #e50914;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .movie-card {
            cursor: pointer;
            background: #222;
            border-radius: 6px;
            overflow: hidden;
            transition: transform 0.2s;
        }
        .movie-card:hover {
            transform: scale(1.05);
        }
        .movie-card img {
            width: 100%;
            display: block;
        }
        .movie-title {
            padding: 8px;
            font-size: 12px;
            text-align: center;
        }
        .player-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            width: 100%;
            background: #000;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            display: none;
        }
        .player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🍿 Family Cinema</h1>
    
    <div class="search-box">
        <input type="text" id="query" placeholder="Search for a movie...">
        <button onclick="searchMovies()">Search</button>
    </div>

    <div class="results" id="results"></div>

    <div class="player-wrapper" id="playerWrapper">
        <iframe id="player" src="" allowfullscreen sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
    </div>
</div>

<script>
    const TMDB_API_KEY = '670f376983f73b67d757e9a951a3a5a9'; 

    async function searchMovies() {
        const query = document.getElementById('query').value;
        if (!query) return;

        const url = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}`;
        
        try {
            const res = await fetch(url);
            const data = await res.json();
            displayResults(data.results);
        } catch (err) {
            console.error("Error fetching data from TMDB:", err);
        }
    }

    function displayResults(movies) {
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '';
        
        movies.forEach(movie => {
            if (!movie.poster_path) return;
            
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.onclick = () => playMovie(movie.id);
            
            card.innerHTML = `
                <img src="https://image.tmdb.org/t/p/w200${movie.poster_path}" alt="${movie.title}">
                <div class="movie-title">${movie.title}</div>
            `;
            resultsDiv.appendChild(card);
        });
    }

    function playMovie(tmdbId) {
        const playerWrapper = document.getElementById('playerWrapper');
        const player = document.getElementById('player');
        
        player.src = `https://vidsrc.to/embed/movie/${tmdbId}`;
        playerWrapper.style.display = 'block';
        
        playerWrapper.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
